# Hyperledger Besu Configuration for Rinova Private Network
# This configuration supports IBFT 2.0 (Byzantine Fault Tolerance) consensus
# as required by Requirement 8.6 for node failure handling

# Network Configuration
network="rinova-private"
bootnodes=["enode://fe3b557e8fb62b89f4916b721be55ceb828dbd73@besu:30303?discport=30303"]

# Genesis file for private network
genesis-file="/opt/besu/config/genesis.json"

# Data storage
data-path="/opt/besu/data"

# Node identity
node-private-key-file="/opt/besu/keys/nodekey"

# P2P Network Configuration
p2p-enabled=true
p2p-host="0.0.0.0"
p2p-port=30303
max-peers=25

# Discovery Configuration
discovery-enabled=true

# JSON-RPC Configuration (Requirement 8.1 - fast ownership verification < 2 seconds)
rpc-http-enabled=true
rpc-http-host="0.0.0.0"
rpc-http-port=8545
rpc-http-cors-origins=["*"]
rpc-http-api=["ETH","NET","WEB3","CLIQUE","IBFT","ADMIN","DEBUG","MINER","EEA","PRIV","PERM"]
rpc-http-authentication-enabled=false
rpc-http-max-active-connections=1000
rpc-http-max-batch-size=50
rpc-http-max-request-content-length=52428800

# WebSocket Configuration (for real-time blockchain events)
rpc-ws-enabled=true
rpc-ws-host="0.0.0.0"
rpc-ws-port=8546
rpc-ws-api=["ETH","NET","WEB3","CLIQUE","IBFT"]
rpc-ws-authentication-enabled=false
rpc-ws-max-frame-size=1048576
rpc-ws-max-active-connections=500

# GraphQL Configuration
graphql-http-enabled=false

# Metrics and Monitoring
metrics-enabled=true
metrics-host="0.0.0.0"
metrics-port=9545
metrics-protocol="prometheus"

# Mining Configuration (IBFT 2.0 validator)
miner-enabled=true
miner-coinbase="0xfe3b557e8fb62b89f4916b721be55ceb828dbd73"
min-gas-price=0

# Privacy Configuration (for permissioned network)
privacy-enabled=false

# Permissions Configuration
permissions-nodes-config-file-enabled=false
permissions-accounts-config-file-enabled=false

# Logging Configuration
logging="INFO"

# Transaction Pool
tx-pool-max-size=10000
tx-pool-hashes-max-size=15000
tx-pool-retention-hours=999

# Performance Tuning
auto-log-bloom-caching-enabled=true

# IBFT 2.0 Specific Settings
# Block time: 5 seconds for reasonable transaction confirmation
# Epoch length: 30000 blocks for validator list updates
